name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend-quality:
    name: Frontend Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve frontend directory
        id: frontend-dir
        run: |
          if [ -f frontend/package.json ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.frontend-dir.outputs.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm ci

      - name: Audit production dependencies
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run lint

      - name: L10n encoding guard
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run test:l10n

      - name: Test
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run test

      - name: Build
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npx playwright install --with-deps chromium firefox webkit

      - name: UI visual and a11y tests
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run test:ui:only

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ${{ steps.frontend-dir.outputs.dir }}/playwright-report
            ${{ steps.frontend-dir.outputs.dir }}/test-results
          if-no-files-found: ignore
