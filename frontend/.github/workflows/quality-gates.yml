name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend-quality:
    name: Frontend Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve frontend directory
        id: frontend-dir
        run: |
          if [ -f frontend/package.json ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.frontend-dir.outputs.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm ci

      - name: Audit production dependencies
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run lint

      - name: L10n encoding guard
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run test:l10n

      - name: Test
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run test

      - name: Build
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run build

      - name: Theme token audit artifacts
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run audit:theme:tokens

      - name: Theme budget guard
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npm run lint:theme:budget

      - name: Install Playwright browsers
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Theme geometry and layout audits
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:3000 > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:3000 > /dev/null
          THEME_AUDIT_BASE_URL=http://127.0.0.1:3000 npm run test:theme:geometry
          THEME_AUDIT_BASE_URL=http://127.0.0.1:3000 npm run test:layout:widths
          THEME_AUDIT_BASE_URL=http://127.0.0.1:3000 npm run test:admin:redirects

      - name: UI visual and a11y tests
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        run: PLAYWRIGHT_HOST=127.0.0.1 PLAYWRIGHT_PORT=3000 npm run test:ui:only

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ${{ steps.frontend-dir.outputs.dir }}/playwright-report
            ${{ steps.frontend-dir.outputs.dir }}/test-results
          if-no-files-found: ignore
